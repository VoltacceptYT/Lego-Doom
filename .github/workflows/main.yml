name: Build Windows Version

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Unity Project for Windows
        uses: akiojin/unity-build-github-action@v3
        with:
          build-target: 'Windows'            # Build target for 64-bit Windows
          project-directory: ${{ github.workspace }}
          output-directory: ${{ runner.temp }}/Unity
          output-name: 'MyGame-Windows'    # Base name for the output .zip file

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ${{ runner.temp }}/Unity/*.zip
