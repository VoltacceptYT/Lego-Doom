name: Build Windows Version

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Install Unity using webbertakken/unity-setup (works, even if deprecated)
      - name: Install Unity
        uses: webbertakken/unity-setup@v3
        with:
          version: 6000.0.47f1
          components: Windows   # Standalone Windows build support

      # 2. Build using your original action
      - name: Build Unity Project for Windows
        uses: akiojin/unity-build-github-action@v3
        with:
          build-target: 'Win64'

      # 4. Upload artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ${{ runner.temp }}/Unity/*.zip
